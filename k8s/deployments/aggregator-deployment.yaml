apiVersion: apps/v1
kind: Deployment
metadata:
  name: federated-aggregator
  namespace: federated-learning
spec:
  replicas: 1  # Single aggregator instance
  selector:
    matchLabels:
      app: federated-aggregator
  template:
    metadata:
      labels:
        app: federated-aggregator
    spec:
      volumes:
        - name: client-data
          persistentVolumeClaim:
            claimName: master-data-pvc
      containers:
      - name: aggregator
        image: federated-aggregator:latest
        imagePullPolicy: IfNotPresent
        ports:
          - containerPort: 50051
            name: grpc
        volumeMounts:
          - name: client-data
            mountPath: /dataset
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: NUM_CLIENTS
          value: "5"
        - name: MIN_CLIENTS
          value: "5"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m" 
